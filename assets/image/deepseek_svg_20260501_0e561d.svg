<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d2418"/>
      <stop offset="50%" style="stop-color:#c9772e"/>
      <stop offset="100%" style="stop-color:#8b3a0e"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="40" cy="40" r="32" fill="#c9772e"/>
  
  <!-- Wheel -->
  <circle cx="40" cy="40" r="24" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="40" cy="40" r="3" fill="white"/>
  
  <!-- Spokes -->
  <line x1="40" y1="16" x2="40" y2="64" stroke="white" stroke-width="2"/>
  <line x1="16" y1="40" x2="64" y2="40" stroke="white" stroke-width="2"/>
  <line x1="23" y1="23" x2="57" y2="57" stroke="white" stroke-width="2"/>
  <line x1="57" y1="23" x2="23" y2="57" stroke="white" stroke-width="2"/>
  
  <!-- Om symbol -->
  <text x="40" y="47" text-anchor="middle" font-size="20" fill="white" font-weight="bold">🕉️</text>
  
  <!-- Text -->
  <text x="85" y="38" font-family="Poppins, sans-serif" font-size="24" font-weight="800" fill="url(#grad)">KALKI</text>
  <text x="85" y="58" font-family="Poppins, sans-serif" font-size="14" font-weight="500" fill="#c9772e">TOUR</text>
  <text x="85" y="70" font-family="Poppins, sans-serif" font-size="8" fill="#8b7355" letter-spacing="2">JOURNEY TO DIVINITY</text>
</svg>