<!-- Contact Section start -->
<section class="contact-section">

      <h2>Get in Touch</h2>
      <p>Have questions or want to book a cab? </p>
        <p>Contact us anytime.</p>

      <p><i class="fa fa-map-marker "></i> Varanasi, India</p>
